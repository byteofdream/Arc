name: Build ArcIDE

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y qt6-base-dev qt6-webengine-dev qt6-webchannel-dev

    - name: Install Qt (Windows)
      if: matrix.os == 'windows-latest'
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qtwebengine qtwebchannel qtnetwork'

    - name: Setup MinGW
      if: matrix.os == 'windows-latest'
      uses: egor-tensin/setup-mingw@v2

    - name: Configure
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: arc-ide-${{ matrix.os }}
        path: build/
